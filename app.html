<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home Meals – Authentic Home-Cooked Meals, Sydney</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#FACA50',
            'primary-hover': '#EBB630',
            success: '#3A813D',
          },
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
        }
      }
    };
  </script>
  <style>
    :root {
      --primary: #FACA50;
      --primary-hover: #EBB630;
      --bg-secondary: #F4F4F4;
      --text-main: #111111;
      --text-muted: #5A5D66;
      --border: #E5E5E5;
      --success: #3A813D;
    }
    * { box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; color: #111; background: #fff; margin: 0; -webkit-font-smoothing: antialiased; }
    h1,h2,h3,h4 { letter-spacing: -0.02em; color: #111; line-height: 1.2; }
    p { color: #5A5D66; }

    /* Scrollbar */
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    /* Animations */
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeIn 0.3s ease-out; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { display: inline-block; animation: spin 0.8s linear infinite; }

    /* Header */
    .cc-header { position: sticky; top: 0; background: white; border-bottom: 1px solid #E5E5E5; z-index: 100; height: 68px; display: flex; align-items: center; }
    .cc-header-inner { max-width: 1200px; width: 100%; margin: 0 auto; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; }
    .cc-nav-left { display: flex; align-items: center; }
    .cc-logo { font-weight: 900; font-size: 1.35rem; letter-spacing: -0.05em; color: #111; text-decoration: none; display: inline-flex; align-items: center; cursor: pointer; border: none; background: none; font-family: inherit; }
    .cc-logo i { color: #FACA50; font-size: 1.05rem; margin: 0 1px; line-height: 1; }
    .cc-nav-links { display: flex; align-items: center; gap: 4px; margin-left: 28px; }
    .cc-nav-links button { background: none; border: none; cursor: pointer; font-size: 0.9rem; font-weight: 500; color: #5A5D66; font-family: inherit; padding: 6px 12px; border-radius: 6px; transition: color 0.15s, background 0.15s; }
    .cc-nav-links button:hover { color: #111; background: #F4F4F4; }
    .cc-nav-links button.active { color: #111; font-weight: 600; }
    .cc-nav-right { display: flex; align-items: center; gap: 12px; }
    @media (max-width: 768px) { .cc-nav-links { display: none; } }

    /* Buttons */
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; border: none; border-radius: 9999px; padding: 10px 24px; cursor: pointer; font-family: inherit; font-size: 0.9rem; font-weight: 700; transition: background 0.15s, transform 0.1s; text-decoration: none; }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: #FACA50; color: #111; }
    .btn-primary:hover { background: #EBB630; }
    .btn-outline { background: white; color: #111; border: 1.5px solid #E5E5E5; }
    .btn-outline:hover { border-color: #111; }
    .btn-success { background: #3A813D; color: white; }
    .btn-sm { padding: 7px 18px; font-size: 0.85rem; }

    /* Forms */
    fieldset { border: 1px solid #E5E5E5; border-radius: 8px; padding: 24px; margin-bottom: 20px; background: white; }
    legend { font-weight: 700; padding: 0 8px; font-size: 0.95rem; color: #111; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 0.85rem; color: #111; }
    .form-input { width: 100%; padding: 11px 14px; border: 1px solid #E5E5E5; border-radius: 8px; font-size: 0.9rem; font-family: inherit; color: #111; background: white; transition: border-color 0.15s; }
    .form-input:focus { outline: none; border-color: #FACA50; box-shadow: 0 0 0 2px rgba(250,202,80,0.2); }
    textarea.form-input { resize: vertical; line-height: 1.5; }
    select.form-input { appearance: auto; cursor: pointer; }
    .form-input[readonly] { background: #F4F4F4; color: #5A5D66; cursor: not-allowed; }
    .addr-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 640px) { .addr-row { grid-template-columns: 1fr; } }
    .char-count { font-size: 0.78rem; color: #5A5D66; text-align: right; margin-top: 4px; }

    /* Radio / Checkbox */
    .radio-opt label { display: flex; align-items: flex-start; gap: 10px; padding: 12px 14px; border: 1.5px solid #E5E5E5; border-radius: 8px; cursor: pointer; font-size: 0.9rem; margin-bottom: 8px; transition: border-color 0.15s; }
    .radio-opt label:hover { border-color: #FACA50; }
    .radio-opt input[type="radio"] { accent-color: #111; margin-top: 2px; flex-shrink: 0; }
    .checkbox-row { display: flex; align-items: flex-start; gap: 10px; padding: 14px 16px; background: rgba(250,202,80,0.12); border-radius: 8px; border: 1px solid rgba(250,202,80,0.4); }
    .checkbox-row input[type="checkbox"] { accent-color: #111; width: 18px; height: 18px; flex-shrink: 0; margin-top: 1px; }

    /* Success banner */
    .success-banner { background: rgba(58,129,61,0.1); border-left: 4px solid #3A813D; border-radius: 8px; padding: 24px; margin-bottom: 24px; }
    .success-banner h2 { color: #3A813D; margin-bottom: 8px; }

    /* Tag chips */
    .tag { display: inline-flex; align-items: center; gap: 5px; background: #F4F4F4; border: 1px solid #E5E5E5; border-radius: 20px; padding: 4px 12px; font-size: 0.82rem; font-weight: 500; color: #111; }
    .tag button { background: none; border: none; cursor: pointer; color: #5A5D66; font-size: 0.9rem; padding: 0; line-height: 1; }
    .tag button:hover { color: #D0342C; }

    /* Footer */
    .cc-footer { background: #111; color: white; padding: 48px 24px 32px; margin-top: 80px; }
    .cc-footer a { color: #aaa; text-decoration: none; font-size: 0.88rem; }
    .cc-footer a:hover { color: white; }
    .cc-footer .cc-logo { color: white; }
    .cc-footer .cc-logo i { color: #FACA50; }

    /* Perks grid */
    .perks-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 40px; }
    @media (max-width: 640px) { .perks-grid { grid-template-columns: 1fr 1fr; } }
    .perk-card { background: white; border: 1px solid #E5E5E5; border-radius: 12px; padding: 20px 16px; text-align: center; }
    .perk-card h4 { font-size: 0.95rem; margin: 10px 0 4px; color: #111; }
    .perk-card p { font-size: 0.82rem; margin: 0; color: #5A5D66; }

    /* Admin table */
    .admin-table { width: 100%; border-collapse: collapse; }
    .admin-table th, .admin-table td { text-align: left; padding: 10px 12px; border-bottom: 1px solid #E5E5E5; font-size: 0.88rem; }
    .admin-table th { font-weight: 600; background: #F4F4F4; color: #111; }
    .admin-table tr:hover td { background: rgba(250,202,80,0.05); }

    /* Mobile menu overlay */
    .mobile-nav { position: fixed; top: 68px; left: 0; right: 0; background: white; border-bottom: 1px solid #E5E5E5; padding: 16px 24px; z-index: 99; display: none; flex-direction: column; gap: 4px; box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
    .mobile-nav.open { display: flex; }
    .mobile-nav button { background: none; border: none; cursor: pointer; font-size: 1rem; font-weight: 500; color: #111; font-family: inherit; padding: 10px 0; text-align: left; border-bottom: 1px solid #F4F4F4; }
    .mobile-nav button:last-child { border-bottom: none; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="js/cc-data.js" data-presets="react"></script>
<script type="text/babel" src="js/cc-nav.js" data-presets="react"></script>
<script type="text/babel" src="js/cc-home.js" data-presets="react"></script>
<script type="text/babel" src="js/cc-detail.js" data-presets="react"></script>
<script type="text/babel" src="js/cc-subscribe.js" data-presets="react"></script>
<script type="text/babel" src="js/cc-how.js" data-presets="react"></script>
<script type="text/babel" src="js/cc-portal.js" data-presets="react"></script>
<script type="text/babel" src="js/cc-main.js" data-presets="react"></script>
</body>
</html>
